name: Build & Release macOS DMG

on:
  push:
    branches: [master]
    tags: ['v*.*.*']

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: flutter-actions/setup-flutter@v2
        with:
          channel: stable
          version: 3.38.9

      - name: Installa create-dmg
        run: brew install create-dmg

      - name: Installa Pillow
        run: pip3 install Pillow --break-system-packages

      - name: Flutter pub get
        run: flutter pub get

      - name: Flutter build macOS release
        run: flutter build macos --release

      - name: Genera sfondo DMG
        run: python3 installer/generate_background.py

      - name: Determina nome DMG
        id: dmg_name
        shell: bash
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | cut -d' ' -f2 | cut -d'+' -f1)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            DMG_NAME="Maelstrom-Companion-${VERSION}.dmg"
          else
            SHA=$(git rev-parse --short HEAD)
            DMG_NAME="Maelstrom-Companion-nightly-${SHA}.dmg"
          fi
          echo "dmg_name=${DMG_NAME}" >> "$GITHUB_OUTPUT"

      - name: Crea DMG
        shell: bash
        run: |
          DMG_NAME="${{ steps.dmg_name.outputs.dmg_name }}"
          create-dmg \
            --volname "Maelstrom Companion" \
            --background "installer/dmg_background.png" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 128 \
            --icon "maelstrom_companion.app" 150 190 \
            --app-drop-link 450 190 \
            "${DMG_NAME}" \
            "build/macos/Build/Products/Release/maelstrom_companion.app"

      - name: Verifica DMG generato
        shell: bash
        run: |
          DMG_NAME="${{ steps.dmg_name.outputs.dmg_name }}"
          if [ ! -f "${DMG_NAME}" ]; then
            echo "ERRORE: DMG non trovato: ${DMG_NAME}" >&2
            exit 1
          fi
          echo "DMG verificato: $(du -h "${DMG_NAME}" | cut -f1)"

      - name: Upload artifact (nightly — solo su push master)
        if: github.ref == 'refs/heads/master'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.dmg_name.outputs.dmg_name }}
          path: ${{ steps.dmg_name.outputs.dmg_name }}
          retention-days: 30

      - name: Crea GitHub Release (solo su tag)
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${{ steps.dmg_name.outputs.version }}"
          DMG_NAME="${{ steps.dmg_name.outputs.dmg_name }}"
          # Estrai note dalla sezione [Unreleased] del CHANGELOG
          sed -n '/^## \[Unreleased\]/,/^## \[/p' CHANGELOG.md | head -n -1 > /tmp/release_notes.md
          gh release create "${TAG}" \
            --title "v${VERSION}" \
            --notes-file /tmp/release_notes.md \
            "${DMG_NAME}"
