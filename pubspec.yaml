name: maelstrom_companion
description: "Companion app macOS per Maelstrom — timesheet e timer dalla menubar."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  tray_manager: ^0.2.3
  window_manager: ^0.3.9
  macos_window_utils: ^1.4.0
  flutter_secure_storage: ^9.2.2
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  http: ^1.2.2
  intl: ^0.19.0
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/logo/
